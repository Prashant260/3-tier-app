name: BlogHub CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "apply or destroy"
        required: true
        default: "apply"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ACTION: ${{ github.event.inputs.action || 'apply' }}
      AWS_REGION: ap-south-1
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/bloghub:${{ github.sha }}
      DOCKER_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/bloghub:latest
      DATABASE_USERNAME: bloghub_admin
      CLOUDWATCH_LOG_GROUP: /bloghub/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Login to Docker Hub
        if: env.ACTION == 'apply'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Get Terraform Outputs
        if: env.ACTION == 'apply'
        working-directory: terraform
        run: |
          tf_output() {
            terraform output -no-color -raw "$1" 2>/dev/null \
              | sed '/^[[:space:]]*$/d; /^[[:space:]]*[│╷╵]/d; /^[[:space:]]*Warning:/d' \
              | head -n 1
          }

          printf 'DATABASE_URL=%s\n' "$(tf_output database_url)" >> "$GITHUB_ENV"
          printf 'APP_SERVER_IP=%s\n' "$(tf_output app_server_ip)" >> "$GITHUB_ENV"
     
      - name: Build and push Docker image
        if: env.ACTION == 'apply'
        working-directory: app
        run: |
          docker build -t "$DOCKER_IMAGE" -t "$DOCKER_IMAGE_LATEST" .
          docker push "$DOCKER_IMAGE"
          docker push "$DOCKER_IMAGE_LATEST"
      
      - name: Deploy App on EC2
        if: env.ACTION == 'apply'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.APP_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ env.DOCKER_IMAGE_LATEST }}"

            echo "Using image: $IMAGE"

            docker pull "$IMAGE"

            docker stop bloghub || true
            docker rm bloghub || true

            docker run -d \
              -p 8080:8082 \
              -e DATABASE_URL="${{ env.DATABASE_URL }}" \
              -e DATABASE_USERNAME="${{ env.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --log-driver=awslogs \
              --log-opt awslogs-region="${{ env.AWS_REGION }}" \
              --log-opt awslogs-group="${{ env.CLOUDWATCH_LOG_GROUP }}" \
              --log-opt awslogs-stream="bloghub" \
              --name bloghub \
              "$IMAGE"

      - name: Terraform Destroy
        if: env.ACTION == 'destroy'
        working-directory: terraform
        run: |
          terraform init
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
