version: "3.8"

services:
  bloghub:
    build: .
    container_name: bloghub-app
    ports:
      - "8080:8082"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to a JDBC URL, for example jdbc:postgresql://host:5432/bloghub}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?Set DATABASE_USERNAME to the PostgreSQL username}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD to the PostgreSQL password}
    volumes:
      - bloghub-data:/app/data
      - bloghub-logs:/app/logs

volumes:
  bloghub-data:
  bloghub-logs:
