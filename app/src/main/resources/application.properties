spring.application.name=bloghub
#server port
server.port=8082
# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
# JPA
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# -------------------------------------------------
# Session & Cookie Security Configuration
# -------------------------------------------------
# Prevent JavaScript access to session cookie (recommended)
# Prevent JavaScript access (good)
server.servlet.session.cookie.http-only=true

# REQUIRED for HTTPS (Render)
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Session duration (optional)
server.servlet.session.cookie.max-age=1800

# REQUIRED for credentials: 'include'
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}

# Cookie scope
server.servlet.session.cookie.path=/

# Cookie name
server.servlet.session.cookie.name=JSESSIONID

# -------------------------------------------------
# AWS Cognito OAuth2 Login
# -------------------------------------------------
spring.security.oauth2.client.registration.cognito.client-id=${COGNITO_CLIENT_ID:3v5qqh262de067ilko3860iu40}
spring.security.oauth2.client.registration.cognito.client-secret=${COGNITO_CLIENT_SECRET:}
spring.security.oauth2.client.registration.cognito.scope=openid,email,phone
spring.security.oauth2.client.registration.cognito.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.cognito.issuer-uri=${COGNITO_ISSUER_URI:https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_WCTXflpm7}
spring.security.oauth2.client.provider.cognito.user-name-attribute=username

cognito.logout.domain=${COGNITO_LOGOUT_DOMAIN:}
cognito.logout.redirect-url=${COGNITO_LOGOUT_REDIRECT_URL:http://localhost:8082/}
 

